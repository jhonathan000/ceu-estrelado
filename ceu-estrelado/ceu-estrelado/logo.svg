<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#080D1A"/>
      <stop offset="100%" stop-color="#04070E"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C96A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E8C96A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Decorative rings -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#E8C96A" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="256" cy="256" r="215" fill="none" stroke="#E8C96A" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Star glow -->
  <circle cx="256" cy="210" r="80" fill="url(#starGlow)"/>

  <!-- Background stars (small) -->
  <circle cx="80" cy="80" r="1.5" fill="#E2E6F0" opacity="0.6"/>
  <circle cx="140" cy="60" r="1" fill="#E2E6F0" opacity="0.4"/>
  <circle cx="200" cy="90" r="1.5" fill="#E8C96A" opacity="0.5"/>
  <circle cx="380" cy="70" r="1" fill="#E2E6F0" opacity="0.5"/>
  <circle cx="430" cy="110" r="1.5" fill="#E2E6F0" opacity="0.4"/>
  <circle cx="460" cy="80" r="1" fill="#E8C96A" opacity="0.6"/>
  <circle cx="60" cy="160" r="1" fill="#E2E6F0" opacity="0.3"/>
  <circle cx="450" cy="200" r="1.5" fill="#E2E6F0" opacity="0.4"/>
  <circle cx="90" cy="380" r="1" fill="#E8C96A" opacity="0.4"/>
  <circle cx="420" cy="380" r="1.5" fill="#E2E6F0" opacity="0.5"/>
  <circle cx="160" cy="440" r="1" fill="#E2E6F0" opacity="0.3"/>
  <circle cx="360" cy="450" r="1" fill="#E8C96A" opacity="0.4"/>

  <!-- 8-point star (main) -->
  <g transform="translate(256,210)">
    <path d="M0,-58 L8,-8 L58,0 L8,8 L0,58 L-8,8 L-58,0 L-8,-8 Z" fill="#E8C96A"/>
    <path d="M0,-42 L5.5,-5.5 L42,0 L5.5,5.5 L0,42 L-5.5,5.5 L-42,0 L-5.5,-5.5 Z" fill="#C49A3C" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="#E8C96A"/>
  </g>

  <!-- Small accent stars -->
  <g transform="translate(180,155)">
    <path d="M0,-12 L1.8,-1.8 L12,0 L1.8,1.8 L0,12 L-1.8,1.8 L-12,0 L-1.8,-1.8 Z" fill="#E8C96A" opacity="0.7"/>
  </g>
  <g transform="translate(332,155)">
    <path d="M0,-10 L1.5,-1.5 L10,0 L1.5,1.5 L0,10 L-1.5,1.5 L-10,0 L-1.5,-1.5 Z" fill="#E8C96A" opacity="0.5"/>
  </g>

  <!-- JOHN STAR text -->
  <text x="256" y="308" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="#E8C96A" letter-spacing="6">JOHN STAR</text>

  <!-- Divider ornament -->
  <text x="256" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#E8C96A" opacity="0.6" letter-spacing="4">✦ · · · ✦</text>

  <!-- EXPERIENCE text -->
  <text x="256" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7888A8" letter-spacing="8">EXPERIENCE</text>
</svg>
