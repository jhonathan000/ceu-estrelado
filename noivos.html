<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memórias — Céu Estrelado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg1:#04070E;--bg2:#080D1A;
  --accent:#E8C96A;--accent2:#C49A3C;
  --text:#E2E6F0;--muted:#7888A8;--border:rgba(120,136,168,.2);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg1);}
body{font-family:'Jost',sans-serif;color:var(--text);}

/* SKY */
#sky-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* HEADER */
.n-header{position:fixed;top:0;left:0;right:0;z-index:10;text-align:center;padding:36px 20px 16px;pointer-events:none;}
.n-ornament{color:var(--accent);font-size:12px;letter-spacing:8px;opacity:.7;margin-bottom:10px;}
.n-title{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,28px);color:var(--text);}
.n-date{font-size:12px;color:var(--muted);letter-spacing:2px;margin-top:4px;}
.n-count{font-size:12px;color:var(--accent);margin-top:6px;}

/* BOTTOM PANEL */
#bottom-panel{position:fixed;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(to top,rgba(4,7,14,.98),rgba(4,7,14,.85));border-top:1px solid var(--border);max-height:55vh;display:flex;flex-direction:column;}
.bp-handle{padding:12px;text-align:center;cursor:pointer;flex-shrink:0;}
.bp-handle div{width:36px;height:3px;background:var(--border);border-radius:3px;margin:0 auto;}
.bp-filters{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;flex-shrink:0;}
.bp-filters::-webkit-scrollbar{display:none;}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:50px;font-size:12px;cursor:pointer;white-space:nowrap;background:transparent;color:var(--muted);transition:all .2s;flex-shrink:0;}
.filter-btn.active{background:rgba(232,201,106,.1);border-color:var(--accent);color:var(--accent);}
.bp-list{overflow-y:auto;padding:0 16px 100px;flex:1;}
.msg-item{padding:14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:border .2s;}
.msg-item:hover{border-color:var(--accent);}
.msg-top{display:flex;justify-content:space-between;align-items:center;}
.msg-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--accent);}
.msg-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.badge{display:inline-block;padding:2px 8px;border-radius:50px;font-size:10px;}
.badge-audio{background:rgba(120,180,220,.15);color:#7ab8dc;}
.badge-video{background:rgba(180,120,220,.15);color:#b478dc;}
.badge-foto{background:rgba(120,220,120,.15);color:#78dc78;}
.badge-texto{background:rgba(220,200,120,.15);color:#dcc878;}
.msg-media{margin-top:10px;}
.msg-media audio,.msg-media video{width:100%;border-radius:8px;}
.msg-media img{width:100%;border-radius:8px;max-height:180px;object-fit:cover;}
.msg-media p{font-size:14px;color:var(--text);line-height:1.6;}
.msg-item.expanded .msg-media{display:block;}

/* STAR POPUP */
#star-popup{position:fixed;bottom:60vh;left:20px;right:20px;z-index:25;background:rgba(8,13,26,.97);border:1px solid rgba(232,201,106,.3);border-radius:20px;padding:20px;display:none;}
#star-popup.show{display:block;}
.sp-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}

/* BOTTOM BTNS */
.n-actions{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:16px 20px 36px;display:flex;gap:10px;pointer-events:none;}
.n-actions button{pointer-events:all;flex:1;padding:13px;border-radius:50px;font-size:13px;font-family:'Jost',sans-serif;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn-sky{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-sky.active{border-color:var(--accent);color:var(--accent);}
.btn-download{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#04070E;font-weight:600;}

/* LIST VIEW */
#list-view{position:fixed;inset:0;z-index:30;background:var(--bg1);display:none;flex-direction:column;}
#list-view.show{display:flex;}
.lv-header{padding:20px 20px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.lv-back{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
.lv-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);}
.lv-filters{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;border-bottom:1px solid var(--border);}
.lv-filters::-webkit-scrollbar{display:none;}
.lv-list{flex:1;overflow-y:auto;padding:16px 20px 100px;}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(232,201,106,.15);border:1px solid rgba(232,201,106,.4);color:var(--accent);padding:10px 20px;border-radius:50px;font-size:13px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<canvas id="sky-canvas"></canvas>

<div class="n-header">
  <div class="n-ornament">✦ · ✦ · ✦</div>
  <div class="n-title" id="n-title">Carregando...</div>
  <div class="n-date" id="n-date"></div>
  <div class="n-count" id="n-count"></div>
</div>

<!-- STAR POPUP -->
<div id="star-popup">
  <button class="sp-close" onclick="closeStarPopup()">✕</button>
  <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);margin-bottom:6px;" id="sp-name"></div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:12px;" id="sp-time"></div>
  <div id="sp-media"></div>
</div>

<!-- LIST VIEW -->
<div id="list-view">
  <div class="lv-header">
    <button class="lv-back" onclick="closeListView()">←</button>
    <span class="lv-title">Todas as memórias</span>
  </div>
  <div class="lv-filters" id="lv-filters">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('audio',this)">🎙️ Voz</button>
    <button class="filter-btn" onclick="setFilter('video',this)">🎬 Vídeo</button>
    <button class="filter-btn" onclick="setFilter('foto',this)">📸 Foto</button>
    <button class="filter-btn" onclick="setFilter('texto',this)">💌 Texto</button>
  </div>
  <div class="lv-list" id="lv-list"></div>
</div>

<!-- BOTTOM ACTIONS -->
<div class="n-actions">
  <button class="btn-sky" id="btn-list" onclick="openListView()">📋 Mensagens</button>
  <button class="btn-download" onclick="downloadOffline()">⬇ Baixar memórias</button>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbConfig = {
  apiKey:"AIzaSyCVYVKB4jUVCtPFK9CWkgcuQajgRdGn37I",
  authDomain:"ceu-de-estrelas.firebaseapp.com",
  projectId:"ceu-de-estrelas",
  storageBucket:"ceu-de-estrelas.firebasestorage.app",
  messagingSenderId:"105586302725",
  appId:"1:105586302725:web:6749a0df0d89d8ee63e16c"
};
const app = initializeApp(fbConfig);
const db = getFirestore(app);

let eventSlug='', eventData=null, messages=[], filteredMsgs=[], currentFilter='todos';
let skyStars=[], animFrame=null;

window.addEventListener('DOMContentLoaded', async()=>{
  const params = new URLSearchParams(location.search);
  eventSlug = params.get('e')||'';
  if (!eventSlug) return;
  await loadEvent();
});

async function loadEvent(){
  try{
    const q=query(collection(db,'eventos'),where('slug','==',eventSlug));
    const snap=await getDocs(q);
    if(snap.empty){showToast('Evento não encontrado');return;}
    eventData=snap.docs[0].data();
    await loadMessages();
    renderHeader();
    drawSky();
  }catch(e){showToast('Erro ao carregar');}
}

async function loadMessages(){
  const q=query(collection(db,'mensagens'),where('eventoSlug','==',eventSlug));
  const snap=await getDocs(q);
  messages=snap.docs.map(d=>d.data());
  filteredMsgs=[...messages];
}

function renderHeader(){
  const con={casamento:' & ',aniversario:' — ',formatura:' | ',corporativo:' · ',outro:' & '};
  const c=con[eventData.tipo]||' & ';
  const nome=eventData.nome2?eventData.nome1+c+eventData.nome2:eventData.nome1;
  document.getElementById('n-title').textContent=nome;
  document.getElementById('n-date').textContent=eventData.data||'';
  document.getElementById('n-count').textContent=`✦ ${messages.length} memória${messages.length!==1?'s':''}`;
}

function drawSky(){
  const c=document.getElementById('sky-canvas');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height;

  // BG
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'#04070E'); grad.addColorStop(1,'#080D1A');
  ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);

  // BG stars
  for(let i=0;i<180;i++){
    ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,Math.random()*1.2+.2,0,Math.PI*2);
    ctx.fillStyle=`rgba(226,230,240,${Math.random()*.5+.1})`; ctx.fill();
  }

  skyStars=[];

  // Animate message stars
  let t=0;
  function frame(){
    // Redraw only message stars area
    ctx.clearRect(0,0,w,h);
    const g2=ctx.createLinearGradient(0,0,0,h);
    g2.addColorStop(0,'#04070E'); g2.addColorStop(1,'#080D1A');
    ctx.fillStyle=g2; ctx.fillRect(0,0,w,h);

    for(let i=0;i<180;i++){
      const seed = i*7+1;
      const x=(seed*137.5%1)*w, y=(seed*97.3%1)*h;
      ctx.beginPath(); ctx.arc(x,y,(seed*31.1%1)*1.2+.2,0,Math.PI*2);
      ctx.fillStyle=`rgba(226,230,240,${(seed*53.7%1)*.5+.1})`; ctx.fill();
    }

    messages.forEach((m,i)=>{
      if(!m._x){m._x=30+Math.random()*(w-60); m._y=50+Math.random()*(h-180); m._pulse=Math.random()*Math.PI*2; m._r=16;}
      m._pulse+=0.025;
      const scale=1+Math.sin(m._pulse)*0.2;
      const mc=m.cor||'#E8C96A';
      ctx.save();
      ctx.translate(m._x,m._y);
      ctx.scale(scale,scale);
      ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2);
      ctx.fillStyle=mc; ctx.shadowColor=mc; ctx.shadowBlur=14; ctx.fill();
      ctx.restore();
      ctx.font='10px Jost'; ctx.fillStyle='rgba(226,230,240,.7)'; ctx.textAlign='center';
      ctx.fillText(m.nome||'',m._x,m._y+20);
      if(i>=skyStars.length) skyStars.push({x:m._x,y:m._y,r:m._r,data:m});
    });
    t++;
    animFrame=requestAnimationFrame(frame);
  }
  frame();

  c.onclick=(e)=>{
    const rect=c.getBoundingClientRect();
    const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
    const hit=skyStars.find(s=>Math.hypot(cx-s.x,cy-s.y)<s.r+8);
    if(hit) showStarPopup(hit.data);
    else closeStarPopup();
  };
}

function showStarPopup(m){
  document.getElementById('sp-name').textContent=m.nome||'Anônimo';
  document.getElementById('sp-time').textContent=m.hora||'';
  const med=document.getElementById('sp-media');
  med.innerHTML='';
  if(m.midiaTipo==='audio') med.innerHTML=`<audio controls src="${m.midiaURL}" style="width:100%;"></audio>`;
  else if(m.midiaTipo==='video') med.innerHTML=`<video controls src="${m.midiaURL}" style="width:100%;max-height:200px;border-radius:8px;"></video>`;
  else if(m.midiaTipo==='foto') med.innerHTML=`<img src="${m.midiaURL}" style="width:100%;border-radius:8px;max-height:200px;object-fit:cover;">`;
  else if(m.midiaTipo==='texto') med.innerHTML=`<p style="color:var(--text);font-size:14px;line-height:1.6;">${m.midiaTexto||''}</p>`;
  document.getElementById('star-popup').classList.add('show');
}

window.closeStarPopup=()=>document.getElementById('star-popup').classList.remove('show');

// LIST VIEW
let currentFilterBtn=null;
window.setFilter=function(f,btn){
  currentFilter=f;
  document.querySelectorAll('#lv-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filteredMsgs=f==='todos'?messages:messages.filter(m=>m.midiaTipo===f);
  renderList();
};

window.openListView=function(){
  document.getElementById('list-view').classList.add('show');
  renderList();
};

window.closeListView=()=>document.getElementById('list-view').classList.remove('show');

function renderList(){
  const badges={audio:'badge-audio',video:'badge-video',foto:'badge-foto',texto:'badge-texto'};
  document.getElementById('lv-list').innerHTML=filteredMsgs.length?
    filteredMsgs.map((m,i)=>`<div class="msg-item" onclick="toggleMsg(this,${i})">
      <div class="msg-top">
        <div>
          <div class="msg-name">${m.nome||'Anônimo'} <span class="badge ${badges[m.midiaTipo]||''}">${m.midiaTipo}</span></div>
          <div class="msg-meta">${m.hora||''}</div>
        </div>
      </div>
      <div class="msg-media" style="display:none;">${getMediaHtml(m)}</div>
    </div>`).join(''):
    '<p style="color:var(--muted);text-align:center;padding:30px;">Nenhuma mensagem</p>';
}

window.toggleMsg=function(el,i){
  const media=el.querySelector('.msg-media');
  const open=media.style.display==='block';
  document.querySelectorAll('#lv-list .msg-media').forEach(m=>m.style.display='none');
  if(!open) media.style.display='block';
};

function getMediaHtml(m){
  if(m.midiaTipo==='audio') return `<audio controls src="${m.midiaURL}" style="width:100%;margin-top:10px;"></audio>`;
  if(m.midiaTipo==='video') return `<video controls src="${m.midiaURL}" style="width:100%;max-height:200px;border-radius:8px;margin-top:10px;"></video>`;
  if(m.midiaTipo==='foto') return `<img src="${m.midiaURL}" style="width:100%;border-radius:8px;max-height:200px;object-fit:cover;margin-top:10px;">`;
  if(m.midiaTipo==='texto') return `<p style="color:var(--text);font-size:14px;line-height:1.6;margin-top:10px;">${m.midiaTexto||''}</p>`;
  return '';
}

// DOWNLOAD OFFLINE
window.downloadOffline=async function(){
  showToast('Preparando arquivo offline... ✨');
  const con={casamento:' & ',aniversario:' — ',formatura:' | ',corporativo:' · ',outro:' & '};
  const c=con[eventData?.tipo]||' & ';
  const nome=eventData?.nome2?eventData.nome1+c+eventData.nome2:eventData?.nome1||'Evento';

  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Memórias — ${nome}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Georgia,serif;background:#04070E;color:#E2E6F0;padding:20px;}
h1{color:#E8C96A;text-align:center;margin:20px 0;font-size:28px;}
.sub{text-align:center;color:#7888A8;margin-bottom:30px;font-size:14px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.fb{padding:6px 14px;border:1px solid rgba(120,136,168,.3);border-radius:50px;font-size:12px;cursor:pointer;background:transparent;color:#7888A8;}
.fb.a{border-color:#E8C96A;color:#E8C96A;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(120,136,168,.2);border-radius:12px;padding:16px;margin-bottom:12px;}
.cn{color:#E8C96A;font-size:16px;margin-bottom:4px;}
.cm{font-size:11px;color:#7888A8;margin-bottom:10px;}
audio,video{width:100%;margin-top:8px;border-radius:8px;}
img{width:100%;border-radius:8px;max-height:200px;object-fit:cover;margin-top:8px;}
p.txt{font-size:14px;color:#E2E6F0;line-height:1.6;margin-top:8px;}
.badge{display:inline-block;padding:2px 8px;border-radius:50px;font-size:10px;margin-left:6px;}
.ba{background:rgba(120,180,220,.15);color:#7ab8dc;}
.bv{background:rgba(180,120,220,.15);color:#b478dc;}
.bf{background:rgba(120,220,120,.15);color:#78dc78;}
.bt{background:rgba(220,200,120,.15);color:#dcc878;}
</style></head><body>
<h1>✦ ${nome}</h1>
<p class="sub">${eventData?.data||''} · ${messages.length} memórias</p>
<div class="filters">
<button class="fb a" onclick="filter('todos',this)">Todos</button>
<button class="fb" onclick="filter('audio',this)">🎙️ Voz</button>
<button class="fb" onclick="filter('video',this)">🎬 Vídeo</button>
<button class="fb" onclick="filter('foto',this)">📸 Foto</button>
<button class="fb" onclick="filter('texto',this)">💌 Texto</button>
</div>
<div id="list">
${messages.map(m=>{
  const bc={audio:'ba',video:'bv',foto:'bf',texto:'bt'}[m.midiaTipo]||'';
  let media='';
  if(m.midiaTipo==='audio') media=`<audio controls src="${m.midiaURL}"></audio>`;
  else if(m.midiaTipo==='video') media=`<video controls src="${m.midiaURL}"></video>`;
  else if(m.midiaTipo==='foto') media=`<img src="${m.midiaURL}">`;
  else if(m.midiaTipo==='texto') media=`<p class="txt">${m.midiaTexto||''}</p>`;
  return `<div class="card" data-tipo="${m.midiaTipo}"><div class="cn">${m.nome||'Anônimo'}<span class="badge ${bc}">${m.midiaTipo}</span></div><div class="cm">${m.hora||''}</div>${media}</div>`;
}).join('')}
</div>
<script>function filter(t,btn){document.querySelectorAll('.fb').forEach(b=>b.classList.remove('a'));btn.classList.add('a');document.querySelectorAll('.card').forEach(c=>{c.style.display=t==='todos'||c.dataset.tipo===t?'block':'none';});}<\/script>
</body></html>`;

  const a=document.createElement('a');
  a.href='data:text/html;charset=utf-8,'+encodeURIComponent(html);
  a.download=`memorias-${eventSlug}.html`;
  a.click();
  showToast('Download iniciado!');
};

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

window.addEventListener('resize',()=>{
  if(animFrame) cancelAnimationFrame(animFrame);
  messages.forEach(m=>{delete m._x;delete m._y;delete m._pulse;});
  skyStars=[];
  drawSky();
});
</script>
</body>
</html>
