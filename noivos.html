<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Nossas Memórias</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=EB+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCVYVKB4jUVCtPFK9CWkgcuQajgRdGn37I",
  authDomain:        "ceu-de-estrelas.firebaseapp.com",
  projectId:         "ceu-de-estrelas",
  storageBucket:     "ceu-de-estrelas.firebasestorage.app",
  messagingSenderId: "105586302725",
  appId:             "1:105586302725:web:6749a0df0d89d8ee63e16c"
};

const configured = !Object.values(firebaseConfig).includes("COLE_AQUI");
if (configured) {
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  window._db = db;
  window._fns = { collection, onSnapshot, query, where };
  window._fbOk = true;
}
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg1:#04070E;--bg2:#080D1A;--accent:#E8C96A;--accent2:#C49A3C;--text:#E2E6F0;--muted:#7888A8;--border:rgba(200,216,240,.1)}
html,body{height:100%;width:100%;background:#04070E;font-family:'Jost',sans-serif;color:var(--text);overflow:hidden;margin:0;padding:0}
#app{width:100%;max-width:100%;height:100vh;margin:0;position:relative;overflow:hidden;display:flex;flex-direction:column}

.screen{display:none;flex-direction:column;align-items:center;width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
.screen.active{display:flex}

/* WELCOME — mesmo layout do app: conteúdo no topo, céu 100% */
#s-welcome{position:relative;overflow:hidden}
#bg-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
/* painel no topo */
.w-over{
  position:absolute;top:0;left:0;right:0;
  z-index:2;
  background:linear-gradient(180deg,
    rgba(4,7,14,.94) 0%,
    rgba(4,7,14,.65) 58%,
    transparent 100%
  );
  padding:calc(env(safe-area-inset-top,0px) + 18px) 24px 44px;
  display:flex;flex-direction:column;align-items:center;text-align:center;
}
.orn{font-family:'EB Garamond',serif;color:var(--accent2);font-size:14px;letter-spacing:8px;opacity:.7;margin-bottom:12px}
.w-tit{font-family:'Playfair Display',serif;font-size:clamp(44px,14vw,72px);font-weight:400;color:var(--text);line-height:1.05;margin-bottom:5px}
.w-tit em{font-style:italic;color:var(--accent)}
.w-date{font-family:'EB Garamond',serif;font-size:15px;font-style:italic;color:var(--muted);margin-bottom:6px}
.w-cnt{font-size:11px;color:var(--accent2);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:16px}
/* botões fixos na base */
.w-btns{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:10px 28px calc(env(safe-area-inset-bottom,0px) + 24px);
  background:linear-gradient(0deg,rgba(4,7,14,.95) 0%,rgba(4,7,14,.7) 60%,transparent 100%);
}

.btn-a{font-family:'Jost',sans-serif;font-size:clamp(10px,2.5vw,12px);font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#0a0a0a;background:var(--accent);border:none;border-radius:50px;padding:clamp(12px,3vw,16px) clamp(24px,6vw,44px);cursor:pointer;box-shadow:0 0 28px rgba(232,201,106,.22),0 4px 16px rgba(0,0,0,.4);touch-action:manipulation;max-width:340px;width:100%}
.btn-a:active{transform:scale(.97)}
.btn-b{font-family:'Jost',sans-serif;font-size:11px;color:var(--muted);background:transparent;border:1px solid rgba(200,216,240,.16);border-radius:50px;padding:12px 28px;cursor:pointer;margin-top:10px;letter-spacing:1px;touch-action:manipulation}
.btn-b:active{border-color:var(--accent2)}

/* MESSAGES LIST */
#s-msgs{justify-content:flex-start;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%)}
.msgs-header{width:100%;padding:clamp(16px,4vw,24px) clamp(16px,4vw,24px) 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.msgs-header h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:4px}
.msgs-header p{font-size:11px;color:var(--muted);letter-spacing:1px}

.filter-bar{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filt{font-size:11px;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s}
.filt.active{background:rgba(232,201,106,.1);border-color:rgba(232,201,106,.4);color:var(--accent)}

.msgs-list{width:100%;flex:1;overflow-y:auto;padding:10px clamp(12px,4vw,20px) 20px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch}
.msg-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.msg-card:active{background:rgba(255,255,255,.07)}
.msg-star-ico{width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.msg-info{flex:1;min-width:0}
.msg-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px}
.msg-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.media-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;background:rgba(232,201,106,.08);color:var(--accent2);border:1px solid rgba(232,201,106,.18)}
.msg-arrow{color:var(--muted);font-size:16px;flex-shrink:0}
.empty-msg{font-size:13px;color:var(--muted);text-align:center;padding:40px;font-style:italic}

/* DETAIL */
#s-detail{background:var(--bg1)}
.detail-inner{width:100%;padding:clamp(20px,5vw,32px) clamp(16px,5vw,28px) 40px;display:flex;flex-direction:column;align-items:center;text-align:center}
.det-star-wrap{width:80px;height:80px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 16px var(--accent2));animation:sg 2.5s infinite alternate}
@keyframes sg{0%{filter:drop-shadow(0 0 10px var(--accent2))}100%{filter:drop-shadow(0 0 22px var(--accent))}}
.det-name{font-family:'Playfair Display',serif;font-size:26px;color:var(--text);margin-bottom:4px}
.det-time{font-size:11px;color:var(--muted);margin-bottom:22px;letter-spacing:1px}
.det-content{width:100%;max-width:440px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px}
.det-text{font-family:'EB Garamond',serif;font-size:17px;color:var(--text);line-height:1.78;font-style:italic}

/* SKY */
#s-sky{padding:0;position:relative}
#sky-c{position:absolute;inset:0;width:100%;height:100%;cursor:default}
.sky-ui{position:absolute;bottom:0;left:0;right:0;z-index:2;background:linear-gradient(0deg,rgba(4,7,14,.96) 0%,rgba(4,7,14,.7) 60%,transparent 100%);padding:14px 20px 26px;display:flex;flex-direction:column;align-items:center;gap:9px}
.sky-tit{font-family:'Playfair Display',serif;font-size:18px;color:var(--text)}
.sky-sub{font-size:10px;color:var(--muted);letter-spacing:1px}

/* LOADING */
#loading{position:fixed;inset:0;background:rgba(4,7,14,.9);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading.show{display:flex}
.lspin{animation:lsp 1.4s linear infinite}
@keyframes lsp{to{transform:rotate(360deg)}}
.ltxt{font-size:11px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase}

/* 404 */
#s-404{background:var(--bg1);justify-content:center;text-align:center;padding:40px 28px;gap:14px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div id="app">

<div id="loading">
  <svg class="lspin" width="36" height="36" viewBox="0 0 36 36">
    <polygon points="18,2 22,12 33,12 24,19 28,30 18,23 8,30 12,19 3,12 14,12" fill="#E8C96A" opacity=".9"/>
  </svg>
  <p class="ltxt" id="ltxt">Carregando…</p>
</div>

<!-- 404 -->
<div id="s-404" class="screen">
  <p style="font-size:40px">✦</p>
  <h2 style="font-family:'Playfair Display',serif;font-size:22px;color:var(--text)">Evento não encontrado</h2>
  <p style="font-size:13px;color:var(--muted);line-height:1.8;max-width:280px">Verifique o link com o organizador do evento.</p>
</div>

<!-- WELCOME -->
<div id="s-welcome" class="screen">
  <canvas id="bg-canvas"></canvas>
  <!-- topo: nome + data + contador -->
  <div class="w-over">
    <p class="orn">✦ &nbsp; ✦ &nbsp; ✦</p>
    <h1 class="w-tit" id="w-tit">Nossas<br><em>Memórias</em></h1>
    <p class="w-date" id="w-date"></p>
    <p class="w-cnt" id="w-cnt">✦ 0 estrelas acesas</p>
  </div>
  <!-- base: botões sempre visíveis -->
  <div class="w-btns">
    <button class="btn-a" onclick="goTo('s-sky')">Ver o céu de estrelas</button>
    <button class="btn-a" id="btn-download" onclick="downloadMemories()" style="background:rgba(232,201,106,.12);color:var(--accent);border:1px solid rgba(232,201,106,.3);box-shadow:none">⬇ &nbsp;Baixar nossas memórias</button>
    <button class="btn-b" onclick="goTo('s-msgs')">Ver lista de mensagens</button>
  </div>
</div>

<!-- MESSAGES LIST -->
<div id="s-msgs" class="screen">
  <div class="msgs-header">
    <h2 id="msgs-title">Mensagens</h2>
    <p id="msgs-sub">0 mensagens</p>
  </div>
  <div class="filter-bar">
    <button class="filt active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filt" onclick="setFilter('audio',this)">🎙 Voz</button>
    <button class="filt" onclick="setFilter('video',this)">🎬 Vídeo</button>
    <button class="filt" onclick="setFilter('photo',this)">📷 Foto</button>
    <button class="filt" onclick="setFilter('text',this)">✍️ Texto</button>
  </div>
  <div class="msgs-list" id="msgs-list">
    <div class="empty-msg">Nenhuma mensagem ainda.</div>
  </div>
  <div style="padding:0 16px 20px;display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn-a" onclick="goTo('s-sky')" style="font-size:10px;padding:12px 24px">Ver no céu</button>
    <button class="btn-b" onclick="goTo('s-welcome')">Início</button>
  </div>
</div>

<!-- SKY -->
<div id="s-sky" class="screen" style="position:relative">
  <canvas id="sky-c"></canvas>
  <div class="sky-ui">
    <p class="sky-tit" id="sky-tit-lbl"></p>
    <p class="sky-sub" id="sky-cnt-lbl">CARREGANDO…</p>
    <button class="btn-b" onclick="goTo('s-msgs')">Ver lista</button>
    <button class="btn-b" onclick="goTo('s-welcome')">Início</button>
  </div>
</div>

<!-- DETAIL -->
<div id="s-detail" class="screen">
  <div class="detail-inner">
    <div class="det-star-wrap">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <polygon id="det-poly" points="40,5 49,29 75,29 55,44 62,69 40,54 18,69 25,44 5,29 31,29" fill="#E8C96A"/>
      </svg>
    </div>
    <p class="det-name" id="det-name"></p>
    <p class="det-time" id="det-time"></p>
    <div class="det-content" id="det-content"></div>
    <button class="btn-b" onclick="goTo('s-msgs')">Voltar</button>
  </div>
</div>

</div>

<script>
let eventData=null, msgs=[], currentFilter='todos', eventSlug='';
let tick=0, wAnim=null, sAnim=null;
const COLS=['#E8C96A','#C8D8F0','#F0C8D8','#A8D8C8','#D8C0F0','#F0D8A0','#B0D0F8'];
const MEDIA_LABELS={audio:'Áudio de voz',video:'Vídeo',photo:'Foto',text:'Mensagem'};
const MEDIA_ICONS={audio:'🎙',video:'🎬',photo:'📷',text:'✍️'};

// BG particles
const BGSTARS=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:.3+Math.random()*1.6,a:.2+Math.random()*.8,tw:Math.random()*Math.PI*2,sp:.3+Math.random()*.9}));

window.addEventListener('load',async()=>{
  const params=new URLSearchParams(location.search);
  eventSlug=params.get('e')||params.get('evento')||'';
  if(!eventSlug){goTo('s-404');return;}
  showLoad('Carregando suas memórias…');

  if(window._fbOk){
    const {collection,onSnapshot,query,where}=window._fns;
    const eq=query(collection(window._db,'eventos'),where('slug','==',eventSlug));
    onSnapshot(eq,snap=>{
      if(snap.empty){hideLoad();goTo('s-404');return;}
      eventData={fid:snap.docs[0].id,...snap.docs[0].data()};
      applyEvent();
      hideLoad();
      if(!document.querySelector('.screen.active')||document.getElementById('s-404').classList.contains('active'))
        goTo('s-welcome');
    });
    const mq=query(collection(window._db,'mensagens'),where('eventoSlug','==',eventSlug));
    onSnapshot(mq,snap=>{
      msgs=snap.docs.map((d,i)=>({fid:d.id,...d.data(),
        px:.06+Math.random()*.88,py:.04+Math.random()*.72,
        size:.75+Math.random()*.65,twOff:Math.random()*Math.PI*2,
        color:d.data().cor||COLS[i%COLS.length]}));
      updCnt();renderMsgs();
    });
  }else{
    eventData={nome1:'Ana',nome2:'Carlos',data:'19 de março de 2026',tema:'estrelas'};
    applyEvent();hideLoad();goTo('s-welcome');
  }
  window.addEventListener('resize',()=>{
    if(document.getElementById('s-welcome').classList.contains('active'))animWelcome();
    if(document.getElementById('s-sky').classList.contains('active'))animSky();
  });
});

function applyEvent(){
  if(!eventData)return;
  document.getElementById('w-tit').innerHTML=`${eventData.nome1}<br><em>& ${eventData.nome2}</em>`;
  document.getElementById('w-date').textContent=eventData.data||'';
  document.getElementById('msgs-title').textContent=`${eventData.nome1} & ${eventData.nome2}`;
  document.getElementById('sky-tit-lbl').textContent=`${eventData.nome1} & ${eventData.nome2}`;
  animWelcome();
}

function updCnt(){
  const n=msgs.length;
  document.getElementById('w-cnt').textContent=`✦ ${n} mensagem${n!==1?'s':''} enviada${n!==1?'s':''}`;
  document.getElementById('msgs-sub').textContent=`${n} mensagem${n!==1?'s':''}`;
  document.getElementById('sky-cnt-lbl').textContent=n?`${n} ESTRELA${n!==1?'S':''} BRILHANDO`:'NENHUMA MENSAGEM AINDA';
}

function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='s-welcome')setTimeout(animWelcome,60);
  if(id==='s-sky')setTimeout(animSky,60);
  if(id==='s-msgs')renderMsgs();
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filt').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderMsgs();
}

function renderMsgs(){
  const list=document.getElementById('msgs-list');
  const filtered=currentFilter==='todos'?msgs:msgs.filter(m=>m.midiaTipo===currentFilter);
  if(!filtered.length){list.innerHTML='<div class="empty-msg">Nenhuma mensagem ainda.</div>';return;}
  list.innerHTML='';
  filtered.forEach(msg=>{
    const c=document.createElement('div');c.className='msg-card';
    const tipo=msg.midiaTipo||'none';
    c.innerHTML=`
      <div class="msg-star-ico"><svg width="36" height="36" viewBox="0 0 36 36"><polygon points="18,2 22,12 33,12 24,19 28,30 18,23 8,30 12,19 3,12 14,12" fill="${msg.color||'#E8C96A'}"/></svg></div>
      <div class="msg-info">
        <div class="msg-name">${msg.nome||'Convidado'}</div>
        <div class="msg-meta">
          <span>${msg.hora||''}</span>
          ${tipo!=='none'?`<span class="media-badge">${MEDIA_ICONS[tipo]||''} ${MEDIA_LABELS[tipo]||tipo}</span>`:''}
          ${msg.midiaTexto?`<span style="opacity:.6;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px">"${msg.midiaTexto.substring(0,35)}${msg.midiaTexto.length>35?'…':''}"</span>`:''}
        </div>
      </div>
      <span class="msg-arrow">›</span>`;
    c.onclick=()=>openDetail(msg);
    list.appendChild(c);
  });
}

function openDetail(msg){
  document.getElementById('det-poly').setAttribute('fill',msg.color||'#E8C96A');
  document.getElementById('det-name').textContent=msg.nome||'Convidado';
  document.getElementById('det-time').textContent=msg.hora||'';
  const box=document.getElementById('det-content');box.innerHTML='';
  const txt=msg.midiaTexto;const url=msg.midiaURL;const tipo=msg.midiaTipo;
  if(!url&&!txt){box.innerHTML='<p class="det-text" style="opacity:.4;text-align:center">Sem mensagem gravada</p>';}
  else if(tipo==='text'||txt){box.innerHTML=`<p class="det-text">"${txt}"</p>`;}
  else if(tipo==='audio'){const a=document.createElement('audio');a.controls=true;a.src=url;a.style.width='100%';box.appendChild(a);}
  else if(tipo==='video'){const v=document.createElement('video');v.controls=true;v.src=url;v.style.cssText='width:100%;border-radius:10px';box.appendChild(v);}
  else if(tipo==='photo'){const img=document.createElement('img');img.src=url;img.style.cssText='width:100%;border-radius:10px;object-fit:cover;max-height:220px';box.appendChild(img);}
  goTo('s-detail');
}

// Drawing
function drawBg(canvas){
  const W=canvas.width,H=canvas.height,ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020408');bg.addColorStop(.5,'#040A16');bg.addColorStop(1,'#070D1A');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  [[W*.22,H*.28,140,'rgba(60,45,140,.07)'],[W*.78,H*.18,110,'rgba(45,80,160,.055)']].forEach(([x,y,r,c])=>{
    const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,c);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });
  BGSTARS.forEach(s=>{
    const tw=Math.sin(tick*s.sp+s.tw)*.32;
    ctx.save();ctx.globalAlpha=Math.max(.06,s.a+tw);ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  msgs.forEach(star=>{
    const x=star.px*W,y=star.py*H,sz=(star.size||1)*14;
    const tw=Math.sin(tick*.65+(star.twOff||0))*.18,al=.88+tw;
    ctx.save();
    ctx.globalAlpha=al*.28;
    const gw=ctx.createRadialGradient(x,y,0,x,y,sz*3);
    gw.addColorStop(0,(star.color)+'55');gw.addColorStop(.5,(star.color)+'22');gw.addColorStop(1,'transparent');
    ctx.fillStyle=gw;ctx.beginPath();ctx.arc(x,y,sz*3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=al;
    const r=sz,ir=r*.42;
    ctx.beginPath();
    for(let i=0;i<10;i++){const a=(i*Math.PI)/5-Math.PI/2,rd=i%2===0?r:ir;ctx.i===0?ctx.moveTo(x+Math.cos(a)*rd,y+Math.sin(a)*rd):ctx.lineTo(x+Math.cos(a)*rd,y+Math.sin(a)*rd);}
    ctx.closePath();ctx.fillStyle=star.color;ctx.fill();
    ctx.globalAlpha=(.3+tw*.4)*al;ctx.strokeStyle=star.color;ctx.lineWidth=.9;
    ctx.beginPath();ctx.moveTo(x,y-sz*1.8);ctx.lineTo(x,y+sz*1.8);ctx.moveTo(x-sz*1.8,y);ctx.lineTo(x+sz*1.8,y);ctx.stroke();
    ctx.globalAlpha=.85;ctx.font=`${Math.max(9,Math.round(10*(W/360)))}px 'Jost',sans-serif`;
    ctx.textAlign='center';ctx.fillStyle='#E2E6F0';ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=5;
    ctx.fillText(star.nome||'',x,y+sz*1.9+13);ctx.shadowBlur=0;
    ctx.restore();
  });
  ctx.textAlign='left';
}

function animWelcome(){
  const c=document.getElementById('bg-canvas');if(!c)return;
  c.width=c.offsetWidth||360;c.height=c.offsetHeight||700;
  cancelAnimationFrame(wAnim);
  function fr(){if(!document.getElementById('s-welcome').classList.contains('active'))return;tick+=.012;drawBg(c);wAnim=requestAnimationFrame(fr);}
  fr();
}
function animSky(){
  const c=document.getElementById('sky-c');if(!c)return;
  c.width=c.parentElement.clientWidth||360;c.height=c.parentElement.clientHeight||700;
  cancelAnimationFrame(sAnim);
  function fr(){if(!document.getElementById('s-sky').classList.contains('active'))return;tick+=.012;drawBg(c);sAnim=requestAnimationFrame(fr);}
  fr();
  c.onclick=(e)=>{
    const rect=c.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(c.width/rect.width),my=(e.clientY-rect.top)*(c.height/rect.height);
    for(let i=msgs.length-1;i>=0;i--){
      const s=msgs[i],sx=s.px*c.width,sy=s.py*c.height,sz=(s.size||1)*14*2.5;
      if(Math.abs(mx-sx)<sz&&Math.abs(my-sy)<sz){openDetail(s);return;}
    }
  };
}


/* ═══ DOWNLOAD ═══ */
async function downloadMemories() {
  if (!msgs.length) { alert('Nenhuma mensagem ainda.'); return; }
  const btn = document.getElementById('btn-download');
  btn.disabled = true;

  try {
    // ── 1. Converter TODAS as mídias para base64 ──
    const mediaMsgs = msgs.filter(m => m.midiaURL && !m.midiaURL.startsWith('blob:'));
    const total = mediaMsgs.length;
    const b64Map = {}; // midiaURL -> { b64, mime }

    for (let i = 0; i < mediaMsgs.length; i++) {
      const m = mediaMsgs[i];
      btn.textContent = '⏳ Baixando ' + (i+1) + '/' + total + '…';
      try {
        const res = await fetch(m.midiaURL);
        if (!res.ok) throw new Error();
        const blob = await res.blob();
        const b64 = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result); // data:mime;base64,...
          r.onerror = rej;
          r.readAsDataURL(blob);
        });
        b64Map[m.midiaURL] = b64; // data URI completo
      } catch(_) {
        // se não conseguir baixar, mantém a URL original como fallback
        b64Map[m.midiaURL] = m.midiaURL;
      }
    }

    // ── 2. Gerar o HTML offline com base64 embedado ──
    btn.textContent = '⏳ Gerando arquivo…';
    const html = buildHTML(b64Map);

    // ── 3. Baixar direto — sem ZIP, arquivo único ──
    const blob = new Blob([html], {type: 'text/html;charset=utf-8'});
    const a = document.createElement('a');
    const nome = ((eventData?.nome1||'')+ '-' +(eventData?.nome2||eventSlug||'casal')).replace(/\s/g,'-');
    a.href = URL.createObjectURL(blob);
    a.download = 'memorias-' + nome + '.html';
    a.click();

    btn.textContent = '✦ Baixado!';
    setTimeout(()=>{ btn.textContent='⬇ Baixar nossas memórias'; btn.disabled=false; }, 3000);

  } catch(err) {
    alert('Erro: ' + err.message);
    btn.textContent='⬇ Baixar nossas memórias'; btn.disabled=false;
  }
}

function buildHTML(b64Map={}) {
  // Substitui URLs do Cloudinary por base64 — 100% offline
  const d = JSON.stringify(msgs.map(m=>({
    nome:m.nome||'',cor:m.cor||'#E8C96A',

    midiaURL: m.midiaURL ? (b64Map[m.midiaURL]||m.midiaURL) : null,
    midiaTexto:m.midiaTexto||null,hora:m.hora||''
  })));
  const n1 = eventData?.nome1||'', n2 = eventData?.nome2||'', dt = eventData?.data||'';
  return `<!DOCTYPE html>

<script>
const D=${d};
const BG=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:.3+Math.random()*1.5,a:.2+Math.random()*.8,tw:Math.random()*Math.PI*2,sp:.3+Math.random()*.9}));
const stars=D.map(s=>({...s,px:.06+Math.random()*.88,py:.08+Math.random()*.68,size:.75+Math.random()*.65,twOff:Math.random()*Math.PI*2}));
let t=0,raf;
function draw(){
  const c=document.getElementById('c'),W=c.width=c.offsetWidth,H=c.height=c.offsetHeight,ctx=c.getContext('2d');
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#020408');bg.addColorStop(.5,'#040A16');bg.addColorStop(1,'#070D1A');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  BG.forEach(s=>{const tw=Math.sin(t*s.sp+s.tw)*.3;ctx.save();ctx.globalAlpha=Math.max(.05,s.a+tw);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});
  stars.forEach(s=>{
    const x=s.px*W,y=s.py*H,r=(s.size||1)*14,al=.88+Math.sin(t*.65+s.twOff)*.18;
    ctx.save();ctx.globalAlpha=al*.28;
    const g=ctx.createRadialGradient(x,y,0,x,y,r*3);g.addColorStop(0,s.cor+'55');g.addColorStop(.5,s.cor+'22');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=al;ctx.beginPath();
    for(let i=0;i<10;i++){const a=(i*Math.PI)/5-Math.PI/2,rd=i%2===0?r:r*.42;i===0?ctx.moveTo(x+Math.cos(a)*rd,y+Math.sin(a)*rd):ctx.lineTo(x+Math.cos(a)*rd,y+Math.sin(a)*rd);}
    ctx.closePath();ctx.fillStyle=s.cor;ctx.fill();
    ctx.globalAlpha=.85;ctx.font=Math.max(8,Math.round(9*(W/360)))+"px 'Jost',sans-serif";ctx.textAlign='center';ctx.fillStyle='#E2E6F0';ctx.shadowColor='rgba(4,7,14,.9)';ctx.shadowBlur=5;
    ctx.fillText(s.nome||'',x,y+r*1.9+13);ctx.shadowBlur=0;ctx.restore();
  });
  ctx.textAlign='left';t+=.012;raf=requestAnimationFrame(draw);
}
draw();
document.getElementById('c').onclick=e=>{
  const c=document.getElementById('c'),rect=c.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(c.width/rect.width),my=(e.clientY-rect.top)*(c.height/rect.height);
  for(let i=stars.length-1;i>=0;i--){const s=stars[i],sx=s.px*c.width,sy=s.py*c.height,sz=(s.size||1)*14*2.5;if(Math.abs(mx-sx)<sz&&Math.abs(my-sy)<sz){openM(s);return;}}
};
function openM(s){
  cancelAnimationFrame(raf);
  document.getElementById('mpoly').setAttribute('fill',s.cor||'#E8C96A');
  document.getElementById('mname').textContent=s.nome||'';
  document.getElementById('mtime').textContent=s.hora||'';
  const b=document.getElementById('mbox');b.innerHTML='';
  if(s.midiaTexto){b.innerHTML='<p class="mtxt">"'+s.midiaTexto+'"</p>';}
  else if(s.midiaURL&&s.midiaTipo==='audio'){const a=document.createElement('audio');a.controls=true;a.src=s.midiaURL;a.style.width='100%';b.appendChild(a);}
  else if(s.midiaURL&&s.midiaTipo==='video'){const v=document.createElement('video');v.controls=true;v.src=s.midiaURL;v.style.cssText='width:100%;border-radius:10px';b.appendChild(v);}
  else if(s.midiaURL&&s.midiaTipo==='photo'){const img=document.createElement('img');img.src=s.midiaURL;img.style.cssText='width:100%;border-radius:10px;object-fit:cover;max-height:220px';b.appendChild(img);}
  else{b.innerHTML='<p class="mtxt" style="opacity:.4;text-align:center">Sem midia</p>';}
  document.getElementById('modal').classList.add('on');
}
function closeM(){document.getElementById('modal').classList.remove('on');draw();}
function setFlt(filter,btn){
  document.querySelectorAll('.flt').forEach(function(b){b.style.background='transparent';b.style.color='#7888A8';b.style.borderColor='rgba(200,216,240,.1)';});
  btn.style.background='rgba(232,201,106,.1)';btn.style.color='#E8C96A';btn.style.borderColor='rgba(232,201,106,.4)';
  renderLista(filter);
}
function renderLista(filter){
  const list=document.getElementById('llist');list.innerHTML='';
  const ICONS={audio:'🎙',video:'🎬',photo:'📷',text:'✍️'};
  const LABELS={audio:'Áudio de voz',video:'Vídeo',photo:'Foto',text:'Mensagem'};
  const filtered=filter==='todos'?stars:stars.filter(function(s){return s.midiaTipo===filter;});
  if(!filtered.length){
    const em=document.createElement('div');em.style.cssText='font-size:13px;color:#7888A8;text-align:center;padding:40px;font-style:italic';em.textContent='Nenhuma mensagem nesta categoria.';list.appendChild(em);return;
  }
  filtered.forEach(function(s){
    const card=document.createElement('div');
    card.style.cssText='background:rgba(255,255,255,.04);border:1px solid rgba(200,216,240,.1);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer';
    const ico=document.createElement('div');ico.style.cssText='width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center';
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('width','32');svg.setAttribute('height','32');svg.setAttribute('viewBox','0 0 32 32');
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');poly.setAttribute('points','16,2 20,11 30,11 22,17 25,27 16,21 7,27 10,17 2,11 12,11');poly.setAttribute('fill',s.cor||'#E8C96A');svg.appendChild(poly);ico.appendChild(svg);
    const info=document.createElement('div');info.style.cssText='flex:1;min-width:0';
    const nm=document.createElement('div');nm.style.cssText='font-size:15px;font-weight:500;color:#E2E6F0;margin-bottom:4px';nm.textContent=s.nome||'Convidado';
    const meta=document.createElement('div');meta.style.cssText='font-size:11px;color:#7888A8;display:flex;gap:8px;align-items:center;flex-wrap:wrap';
    const hora=document.createElement('span');hora.textContent=s.hora||'';meta.appendChild(hora);
    if(s.midiaTipo){const badge=document.createElement('span');badge.style.cssText='display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;background:rgba(232,201,106,.08);color:#C49A3C;border:1px solid rgba(232,201,106,.18)';badge.textContent=(ICONS[s.midiaTipo]||'')+' '+(LABELS[s.midiaTipo]||s.midiaTipo);meta.appendChild(badge);}
    if(s.midiaTexto){const prev=document.createElement('span');prev.style.cssText='font-style:italic;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px';prev.textContent='"'+(s.midiaTexto.length>35?s.midiaTexto.substring(0,35)+'...':s.midiaTexto)+'"';meta.appendChild(prev);}
    info.appendChild(nm);info.appendChild(meta);
    const arr=document.createElement('span');arr.style.cssText='color:#7888A8;font-size:18px;flex-shrink:0';arr.textContent='\u203a';
    card.appendChild(ico);card.appendChild(info);card.appendChild(arr);
    card.onclick=function(){document.getElementById('lista').style.display='none';openM(s);};
    list.appendChild(card);
  });
}
function toggleLista(){
  const el=document.getElementById('lista');
  if(el.style.display==='flex'){el.style.display='none';draw();return;}
  cancelAnimationFrame(raf);el.style.display='flex';
  renderLista('todos');
}
window.addEventListener('resize',()=>{cancelAnimationFrame(raf);draw();});
<\/script>
</body></html>`;
}
