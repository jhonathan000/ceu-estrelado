<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Céu Estrelado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg1:#04070E;--bg2:#080D1A;--card:#0d1525;
  --accent:#E8C96A;--accent2:#C49A3C;
  --text:#E2E6F0;--muted:#7888A8;--border:rgba(120,136,168,.2);
}
body{font-family:'Jost',sans-serif;background:var(--bg1);color:var(--text);min-height:100vh;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);}
.logo span{font-family:'Jost',sans-serif;font-size:12px;color:var(--muted);display:block;letter-spacing:2px;}
nav{display:flex;gap:4px;}
.nav-btn{padding:8px 20px;background:transparent;border:1px solid var(--border);border-radius:50px;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;}
.nav-btn.active,.nav-btn:hover{background:rgba(232,201,106,.1);border-color:var(--accent);color:var(--accent);}
.tab{display:none;padding:24px;max-width:900px;margin:0 auto;}
.tab.active{display:block;}

/* FORM */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:24px;}
.form-card h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px;color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row.full{grid-template-columns:1fr;}
.field label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block;}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Jost',sans-serif;font-size:14px;outline:none;transition:border .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select option{background:var(--bg2);}
.field input[type=color]{padding:6px;height:42px;cursor:pointer;}

/* TEMA PERSONALIZADO */
#custom-fields{display:none;background:rgba(232,201,106,.04);border:1px solid rgba(232,201,106,.15);border-radius:12px;padding:16px;margin-top:12px;}
#custom-fields.show{display:block;}
.custom-preview{width:100%;height:60px;border-radius:8px;margin-top:8px;border:1px solid var(--border);}

/* TIPO BADGES */
.tipos-grid{display:flex;flex-wrap:wrap;gap:8px;}
.tipo-badge{padding:8px 16px;border:1px solid var(--border);border-radius:50px;cursor:pointer;font-size:13px;transition:all .2s;}
.tipo-badge.sel{background:rgba(232,201,106,.1);border-color:var(--accent);color:var(--accent);}

/* BTN */
.btn-primary{padding:14px 28px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04070E;border:none;border-radius:50px;font-weight:600;font-size:14px;letter-spacing:1px;cursor:pointer;width:100%;margin-top:8px;}
.btn-primary:hover{opacity:.9;}

/* EVENTS LIST */
.events-grid{display:grid;gap:16px;}
.event-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;}
.ev-top{display:flex;justify-content:space-between;align-items:flex-start;}
.ev-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);}
.ev-date{font-size:12px;color:var(--muted);}
.ev-tipo{font-size:11px;color:var(--muted);border:1px solid var(--border);padding:3px 10px;border-radius:50px;}
.ev-stats{display:flex;gap:16px;}
.ev-stat{font-size:13px;color:var(--muted);} .ev-stat strong{color:var(--text);}
.ev-links{display:flex;flex-wrap:wrap;gap:8px;}
.ev-link-btn{padding:8px 14px;border-radius:50px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:transparent;color:var(--text);transition:all .2s;}
.ev-link-btn:hover{border-color:var(--accent);color:var(--accent);}
.ev-link-btn.danger:hover{border-color:#dc3232;color:#dc3232;}
.ev-actions{display:flex;flex-wrap:wrap;gap:8px;}

/* MODAL */
#modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(4,7,14,.95);overflow-y:auto;padding:20px;}
#modal.show{display:block;}
.modal-inner{max-width:600px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;}
.msg-item{padding:14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;}
.msg-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--accent);}
.msg-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.msg-media{margin-top:10px;}
.msg-media audio,.msg-media video{width:100%;border-radius:8px;}
.msg-media img{width:100%;border-radius:8px;max-height:200px;object-fit:cover;}
.badge{display:inline-block;padding:2px 10px;border-radius:50px;font-size:11px;margin-left:8px;}
.badge-audio{background:rgba(120,180,220,.15);color:#7ab8dc;}
.badge-video{background:rgba(180,120,220,.15);color:#b478dc;}
.badge-foto{background:rgba(120,220,120,.15);color:#78dc78;}
.badge-texto{background:rgba(220,200,120,.15);color:#dcc878;}

/* QR */
#qr-container{text-align:center;padding:16px 0;}
#qr-container img{max-width:180px;border-radius:12px;border:4px solid var(--accent);}

/* CONFIG */
.config-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;}
.config-card h3{font-size:15px;color:var(--accent);margin-bottom:16px;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(232,201,106,.15);border:1px solid rgba(232,201,106,.4);color:var(--accent);padding:12px 24px;border-radius:50px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}

@media(max-width:600px){.form-row{grid-template-columns:1fr;} nav{gap:2px;} .nav-btn{padding:7px 12px;font-size:12px;}}
</style>
</head>
<body>

<header>
  <div class="logo">✦ Céu Estrelado <span>JOHN STAR EXPERIENCE</span></div>
  <nav>
    <button class="nav-btn active" onclick="showTab('tab-eventos')">Eventos</button>
    <button class="nav-btn" onclick="showTab('tab-criar')">+ Criar</button>
    <button class="nav-btn" onclick="showTab('tab-config')">Config</button>
  </nav>
</header>

<!-- TAB EVENTOS -->
<div id="tab-eventos" class="tab active">
  <div id="events-list"><p style="color:var(--muted);text-align:center;padding:40px;">Carregando eventos...</p></div>
</div>

<!-- TAB CRIAR -->
<div id="tab-criar" class="tab">
  <div class="form-card">
    <h2>✦ Criar novo evento</h2>
    <!-- TIPO -->
    <div class="field" style="margin-bottom:20px;">
      <label>Tipo de evento</label>
      <div class="tipos-grid">
        <div class="tipo-badge sel" data-tipo="casamento" onclick="selectTipo(this)">💍 Casamento</div>
        <div class="tipo-badge" data-tipo="aniversario" onclick="selectTipo(this)">🎂 Aniversário</div>
        <div class="tipo-badge" data-tipo="formatura" onclick="selectTipo(this)">🎓 Formatura</div>
        <div class="tipo-badge" data-tipo="corporativo" onclick="selectTipo(this)">🏢 Corporativo</div>
        <div class="tipo-badge" data-tipo="outro" onclick="selectTipo(this)">✦ Outro</div>
      </div>
    </div>
    <div class="form-row">
      <div class="field"><label id="nome1-label">Nome 1</label><input type="text" id="nome1" placeholder="Ana"></div>
      <div class="field"><label id="nome2-label">Nome 2</label><input type="text" id="nome2" placeholder="Carlos"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Data do evento</label><input type="text" id="data-evento" placeholder="19 de março de 2026"></div>
      <div class="field"><label>Slug (URL)</label><input type="text" id="slug" placeholder="ana-carlos-2026"></div>
    </div>
    <!-- TEMA -->
    <div class="field" style="margin-bottom:16px;">
      <label>Tema visual</label>
      <select id="tema" onchange="onTemaChange()">
        <option value="estrelas">⭐ Céu de Estrelas</option>
        <option value="jardim">🌸 Jardim de Flores</option>
        <option value="mar">🌊 Mar ao Pôr do Sol</option>
        <option value="romance">🕯️ Romance Clássico</option>
        <option value="personalizado">🎨 Personalizado</option>
      </select>
    </div>
    <!-- CUSTOM FIELDS -->
    <div id="custom-fields">
      <div class="form-row">
        <div class="field"><label>Cor principal</label><input type="color" id="custom-color" value="#E8C96A"></div>
        <div class="field"><label>Opacidade imagem (0-1)</label><input type="number" id="custom-opacity" value="0.15" min="0" max="1" step="0.05"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Imagem de fundo (JPG/PNG)</label><input type="file" id="custom-img-file" accept="image/*" onchange="onCustomImg(event)"></div>
        <div class="field"><label>Música de fundo (MP3)</label><input type="file" id="custom-music-file" accept="audio/*" onchange="onCustomMusic(event)"></div>
      </div>
      <canvas id="custom-preview" class="custom-preview"></canvas>
    </div>
    <button class="btn-primary" onclick="criarEvento()">✦ Criar Evento</button>
  </div>
</div>

<!-- TAB CONFIG -->
<div id="tab-config" class="tab">
  <div class="config-card">
    <h3>URL base do sistema</h3>
    <div class="field"><label>URL base (sem barra no final)</label><input type="text" id="base-url" placeholder="https://seu-site.vercel.app"></div>
    <button class="btn-primary" onclick="saveConfig()" style="margin-top:12px;">Salvar</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-inner">
    <div class="modal-header">
      <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);" id="modal-title">Evento</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbConfig = {
  apiKey:"AIzaSyCVYVKB4jUVCtPFK9CWkgcuQajgRdGn37I",
  authDomain:"ceu-de-estrelas.firebaseapp.com",
  projectId:"ceu-de-estrelas",
  storageBucket:"ceu-de-estrelas.firebasestorage.app",
  messagingSenderId:"105586302725",
  appId:"1:105586302725:web:6749a0df0d89d8ee63e16c"
};
const app = initializeApp(fbConfig);
const db = getFirestore(app);

let eventos = [];
let tipoSel = 'casamento';
let customImgData = null, customMusicData = null;

// CONFIG
const BASE_URL = () => localStorage.getItem('baseUrl') || location.origin;
document.getElementById('base-url').value = localStorage.getItem('baseUrl') || location.origin;
window.saveConfig = () => { localStorage.setItem('baseUrl', document.getElementById('base-url').value.trim()); showToast('URL salva!'); };

// TABS
window.showTab = function(id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
};

// TIPO
window.selectTipo = function(el) {
  document.querySelectorAll('.tipo-badge').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  tipoSel = el.dataset.tipo;
  const labels = {casamento:['Nome 1','Nome 2'],aniversario:['Aniversariante',''],formatura:['Turma','Curso'],corporativo:['Empresa','Evento'],outro:['Nome 1','Nome 2']};
  const l = labels[tipoSel];
  document.getElementById('nome1-label').textContent = l[0];
  document.getElementById('nome2-label').textContent = l[1] || 'Nome 2';
  document.getElementById('nome2').placeholder = l[1] || '(opcional)';
};

// TEMA
window.onTemaChange = function() {
  const cf = document.getElementById('custom-fields');
  cf.classList.toggle('show', document.getElementById('tema').value === 'personalizado');
};

// CUSTOM IMG
window.onCustomImg = function(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader(); r.onload = ev => { customImgData = ev.target.result; }; r.readAsDataURL(file);
};
window.onCustomMusic = function(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader(); r.onload = ev => { customMusicData = ev.target.result; }; r.readAsDataURL(file);
};

// CRIAR EVENTO
window.criarEvento = async function() {
  const nome1 = document.getElementById('nome1').value.trim();
  const nome2 = document.getElementById('nome2').value.trim();
  const data = document.getElementById('data-evento').value.trim();
  const slug = document.getElementById('slug').value.trim().toLowerCase().replace(/\s+/g,'-');
  const tema = document.getElementById('tema').value;
  if (!nome1 || !slug) { showToast('Preencha nome e slug'); return; }

  const ev = { nome1, nome2, data, slug, tema, tipo:tipoSel, criadoEm:serverTimestamp() };
  if (tema === 'personalizado') {
    ev.customColor = document.getElementById('custom-color').value;
    ev.customImgOpacity = parseFloat(document.getElementById('custom-opacity').value);
    if (customImgData) ev.customImg = customImgData;
    if (customMusicData) ev.customMusic = customMusicData;
  }
  try {
    await addDoc(collection(db,'eventos'), ev);
    showToast('Evento criado! ✦');
    await loadEvents();
    showTab('tab-eventos');
  } catch(e) { showToast('Erro ao criar evento'); }
};

// LOAD EVENTS
async function loadEvents() {
  const snap = await getDocs(collection(db,'eventos'));
  eventos = snap.docs.map(d=>({id:d.id,...d.data()}));
  // Count messages
  const msgSnap = await getDocs(collection(db,'mensagens'));
  const allMsgs = msgSnap.docs.map(d=>d.data());
  renderEvents(eventos, allMsgs);
}

function renderEvents(evs, allMsgs) {
  const container = document.getElementById('events-list');
  if (!evs.length) { container.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px;">Nenhum evento ainda. Crie o primeiro!</p>'; return; }
  const conectivos = {casamento:' & ',aniversario:' — ',formatura:' | ',corporativo:' · ',outro:' & '};
  container.innerHTML = '<div class="events-grid">'+evs.map(ev=>{
    const con = conectivos[ev.tipo]||' & ';
    const nome = ev.nome2 ? ev.nome1+con+ev.nome2 : ev.nome1;
    const msgs = allMsgs.filter(m=>m.eventoSlug===ev.slug);
    const tipos = {casamento:'💍',aniversario:'🎂',formatura:'🎓',corporativo:'🏢',outro:'✦'};
    return `<div class="event-card">
      <div class="ev-top">
        <div>
          <div class="ev-name">${nome}</div>
          <div class="ev-date">${ev.data||''}</div>
        </div>
        <div class="ev-tipo">${tipos[ev.tipo]||'✦'} ${ev.tipo}</div>
      </div>
      <div class="ev-stats">
        <div class="ev-stat"><strong>${msgs.length}</strong> mensagens</div>
        <div class="ev-stat"><strong>${ev.tema||'estrelas'}</strong> tema</div>
      </div>
      <div class="ev-links">
        <button class="ev-link-btn" onclick="copyLink('${BASE_URL()}/app.html?e=${ev.slug}')">📱 Convidados</button>
        <button class="ev-link-btn" onclick="copyLink('${BASE_URL()}/noivos.html?e=${ev.slug}')">💑 Noivos/Part.</button>
        <button class="ev-link-btn" onclick="openModal('${ev.id}','${ev.slug}','${nome.replace(/'/g,"\\'")}')">🔍 Ver detalhes</button>
        <button class="ev-link-btn danger" onclick="deleteEvent('${ev.id}','${ev.slug}')">🗑 Excluir</button>
      </div>
    </div>`;
  }).join('')+'</div>';
}

window.copyLink = function(url) {
  navigator.clipboard.writeText(url).then(()=>showToast('Link copiado!')).catch(()=>showToast(url));
};

// MODAL
window.openModal = async function(evId, slug, nome) {
  document.getElementById('modal-title').textContent = nome;
  document.getElementById('modal-body').innerHTML = '<p style="color:var(--muted);">Carregando...</p>';
  document.getElementById('modal').classList.add('show');

  const q = query(collection(db,'mensagens'), where('eventoSlug','==',slug));
  const snap = await getDocs(q);
  const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));

  const url = BASE_URL();
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url+'/app.html?e='+slug)}`;

  let html = `<div id="qr-container"><img src="${qrUrl}" alt="QR Code"><div style="font-size:12px;color:var(--muted);margin-top:8px;">${url}/app.html?e=${slug}</div></div>`;
  html += `<div style="display:flex;gap:8px;margin:16px 0;">
    <button class="ev-link-btn" onclick="exportCSV('${slug}')">⬇ CSV</button>
    <button class="ev-link-btn" onclick="downloadZip('${slug}')">⬇ ZIP</button>
  </div>`;
  html += `<div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--text);margin-bottom:12px;">${msgs.length} mensagem${msgs.length!==1?'s':''}</div>`;

  const badgeClass = {audio:'badge-audio',video:'badge-video',foto:'badge-foto',texto:'badge-texto'};
  html += msgs.map(m=>{
    let mediaHtml = '';
    if (m.midiaTipo==='audio') mediaHtml=`<div class="msg-media"><audio controls src="${m.midiaURL}"></audio></div>`;
    else if (m.midiaTipo==='video') mediaHtml=`<div class="msg-media"><video controls src="${m.midiaURL}" style="max-height:200px;"></video></div>`;
    else if (m.midiaTipo==='foto') mediaHtml=`<div class="msg-media"><img src="${m.midiaURL}" style="max-height:200px;object-fit:cover;width:100%;border-radius:8px;"></div>`;
    else if (m.midiaTipo==='texto') mediaHtml=`<p style="margin-top:8px;font-size:14px;color:var(--text);">${m.midiaTexto||''}</p>`;
    return `<div class="msg-item">
      <div class="msg-name">${m.nome||'Anônimo'} <span class="badge ${badgeClass[m.midiaTipo]||''}">${m.midiaTipo}</span></div>
      <div class="msg-meta">${m.hora||''}</div>
      ${mediaHtml}
    </div>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = html;
  window._modalMsgs = msgs;
  window._modalSlug = slug;
};

window.closeModal = () => document.getElementById('modal').classList.remove('show');

// EXPORT CSV
window.exportCSV = function(slug) {
  const msgs = window._modalMsgs || [];
  const rows = [['Nome','Tipo','URL','Texto','Hora'],...msgs.map(m=>[m.nome,m.midiaTipo,m.midiaURL||'',m.midiaTexto||'',m.hora||''])];
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`${slug}-mensagens.csv`; a.click();
};

// DELETE EVENT
window.deleteEvent = async function(evId, slug) {
  if (!confirm(`Excluir o evento "${slug}" e todas as suas mensagens?`)) return;
  try {
    await deleteDoc(doc(db,'eventos',evId));
    const q = query(collection(db,'mensagens'), where('eventoSlug','==',slug));
    const snap = await getDocs(q);
    for (const d of snap.docs) await deleteDoc(doc(db,'mensagens',d.id));
    showToast('Evento excluído');
    await loadEvents();
  } catch(e) { showToast('Erro ao excluir'); }
};

// DOWNLOAD ZIP (simplified - exports as JSON)
window.downloadZip = async function(slug) {
  showToast('Preparando download...');
  const msgs = window._modalMsgs || [];
  const data = JSON.stringify(msgs, null, 2);
  const a = document.createElement('a'); a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download=`${slug}-memorias.json`; a.click();
};

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// INIT
loadEvents();
</script>
</body>
</html>
